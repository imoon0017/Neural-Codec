model:
  arch: curve_codec_multiattn
  latent_dim: 8
  compaction_ratio: 16
  quantizer_bits: 8
  encoder_channels: 64
  attn_heads: 4
  attn_window_sizes: [7, 5, 3, 3, 3]   # N=4 stages → 5 blocks: stem, mid×3, bottleneck
csdf:
  grid_res_nm_per_px: 6.0
  marker_layer: 100
  mask_layer: 1
  truncation_px: 5.0
  marker_margin_nm: 100
dataset:
  mode: cached
  cache_dir: dataset/cache/
training:
  batch_size: 1
  epochs: 200
  val_every_n_epochs: 1
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-2
  lr_scheduler: cosine
  lr_min: 1.0e-6
  warmup_epochs: 5
  lr_step_size: 50
  lr_step_gamma: 0.5
  grad_clip: 1.0
  num_workers: 2
  loss:
    recon: mse
    huber_delta: 1.0
    erosion_margin_px: 16
paths:
  dataset_root: dataset/raw/
  checkpoint_dir: checkpoints/
  run_id: multiattn_D8_c16_B8
