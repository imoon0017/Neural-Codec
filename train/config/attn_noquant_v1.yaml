model:
  arch: curve_codec_attn   # EncoderAttn (conv + windowed MHSA) + Quantizer + Decoder
  latent_dim: 32           # D — latent feature channels
  compaction_ratio: 8      # c — power of 2; spatial downsampling factor (must divide S)
  quantizer_bits: 16       # B — kept for export compatibility; unused when quantize=false
  encoder_channels: 64     # C — hidden width for encoder/decoder conv layers
  attn_heads: 4            # number of MHSA heads at the bottleneck
  attn_window_size: 7      # spatial window side-length w (105 = 15×7, no padding needed)
  quantize: false          # bypass QuantizerLayer — quality ceiling for attn variant

csdf:
  grid_res_nm_per_px: 6.0
  marker_layer: 100
  mask_layer: 1
  truncation_px: 5.0
  marker_margin_nm: 100

dataset:
  mode: cached
  cache_dir: dataset/cache/

training:
  batch_size: 1
  epochs: 200
  val_every_n_epochs: 1

  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 1.0e-2

  lr_scheduler: cosine
  lr_min: 1.0e-6
  warmup_epochs: 5
  lr_step_size: 50
  lr_step_gamma: 0.5

  grad_clip: 1.0
  num_workers: 2

  loss:
    recon: mse
    huber_delta: 1.0
    erosion_margin_px: 16

paths:
  dataset_root: dataset/raw/
  checkpoint_dir: checkpoints/
  run_id: attn_noquant_v1
